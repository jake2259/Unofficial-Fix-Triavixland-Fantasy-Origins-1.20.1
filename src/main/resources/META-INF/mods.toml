description = '''Data-only Forge 1.20.1 add-on for Triavixland Fantasy Origins.

This add-on filters and replaces Triavixland Fantasy Origins' dagger item tag to remove a malformed optional entry:
epicfight:born_in_chaos_v1:intoxicating_dagger

The original value contains two namespace separators and can cause Forge/Minecraft tag loading errors.
This project does not redistribute the original mod jar or any compiled original code.'''

